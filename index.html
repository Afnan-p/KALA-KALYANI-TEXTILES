<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Kala Kalyani Textiles | Premium Kerala Textiles</title>
    <meta name="description" content="Discover Kerala's finest premium ethnic fashion, authentic weaves, and collections for the whole family at Kala Kalyani Textiles in Edappally, Kochi." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    </noscript>
    
    <!-- Preload Critical Hero Images -->
    <link rel="preload" as="image" href="/hero-bg.webp" fetchpriority="high">
    <link rel="preload" as="image" href="/hero-card.webp" fetchpriority="high">
  </head>
  <body>
    <div id="root">
      <!-- App Shell for Instant FCP & LCP -->
      <div style="min-height: 100vh; background-color: #1A1210; position: relative; overflow: hidden; display: flex; align-items: center;">
        <img src="/hero-bg.webp" alt="" fetchpriority="high" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scale(1.05);" />
        <div style="position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.6), rgba(0,0,0,0.3));"></div>
        <div style="position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(212,175,55,0.08) 0%, transparent 70%);"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
